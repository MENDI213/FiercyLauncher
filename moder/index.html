<!doctype html>
<!-- cSpell:disable -->
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>FiercyLauncher | Панель модерации</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700;14..32,800&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css"
    />
    <style>
      /* === ОСНОВНЫЕ СТИЛИ === */
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        font-family: "Inter", sans-serif;
        background: #0a0c0f;
        color: #fff;
        line-height: 1.6;
        overflow-x: hidden;
      }

      body::before {
        content: "";
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background:
          radial-gradient(
            circle at 30% 40%,
            rgba(70, 130, 200, 0.15) 0%,
            transparent 40%
          ),
          radial-gradient(
            circle at 70% 60%,
            rgba(150, 60, 200, 0.12) 0%,
            transparent 45%
          ),
          radial-gradient(
            circle at 10% 80%,
            rgba(30, 150, 220, 0.1) 0%,
            transparent 50%
          );
        z-index: -2;
        animation: backgroundShift 18s ease-in-out infinite alternate;
      }

      @keyframes backgroundShift {
        0% {
          opacity: 0.7;
          transform: scale(1);
        }
        100% {
          opacity: 1;
          transform: scale(1.05);
        }
      }

      body::after {
        content: "";
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.65' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.03'/%3E%3C/svg%3E");
        z-index: -1;
        pointer-events: none;
      }

      .container {
        max-width: 1300px;
        margin: 0 auto;
        padding: 0 30px;
      }

      @keyframes fadeUp {
        0% {
          opacity: 0;
          transform: translateY(30px);
        }
        100% {
          opacity: 1;
          transform: translateY(0);
        }
      }

      .animate-fade-up {
        animation: fadeUp 0.9s cubic-bezier(0.2, 0.9, 0.3, 1) forwards;
        opacity: 0;
      }

      .delay-1 {
        animation-delay: 0.2s;
      }
      .delay-2 {
        animation-delay: 0.4s;
      }
      .delay-3 {
        animation-delay: 0.6s;
      }

      /* ХЕДЕР */
      header {
        padding: 25px 0;
        backdrop-filter: blur(12px);
        background: rgba(10, 12, 15, 0.4);
        border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        position: sticky;
        top: 0;
        z-index: 100;
      }

      .header-content {
        display: flex;
        justify-content: space-between;
        align-items: center;
      }

      .logo {
        display: flex;
        align-items: center;
        gap: 10px;
        font-size: 1.7rem;
        font-weight: 800;
        letter-spacing: -0.5px;
      }

      .logo i {
        color: #4a9eff;
        font-size: 2rem;
        filter: drop-shadow(0 0 10px rgba(74, 158, 255, 0.6));
      }

      .logo span {
        background: linear-gradient(135deg, #fff, #b0d0ff);
        -webkit-background-clip: text;
        background-clip: text;
        -webkit-text-fill-color: transparent;
      }

      .nav-links {
        display: flex;
        gap: 25px;
        font-weight: 500;
        align-items: center;
        flex-wrap: wrap;
      }

      .nav-links a {
        color: rgba(255, 255, 255, 0.75);
        text-decoration: none;
        font-size: 1rem;
        transition:
          color 0.3s,
          text-shadow 0.3s;
        position: relative;
        padding: 5px 0;
      }

      .nav-links a::after {
        content: "";
        position: absolute;
        bottom: -5px;
        left: 0;
        width: 0;
        height: 2px;
        background: linear-gradient(90deg, #4a9eff, #a96eff);
        transition: width 0.3s ease;
      }

      .nav-links a:hover {
        color: #fff;
        text-shadow: 0 0 8px rgba(74, 158, 255, 0.5);
      }

      .nav-links a:hover::after {
        width: 100%;
      }

      .nav-link-special {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        background: rgba(74, 158, 255, 0.1);
        border: 1px solid rgba(74, 158, 255, 0.3);
        border-radius: 30px;
        padding: 8px 18px !important;
        margin-left: 5px;
      }

      .nav-link-special i {
        color: #4a9eff;
        font-size: 1rem;
      }

      .nav-link-special:hover {
        background: rgba(74, 158, 255, 0.2);
        border-color: #4a9eff;
        transform: translateY(-2px);
      }

      .nav-link-special:hover::after {
        display: none;
      }

      /* === ФОРМА ВХОДА === */
      .login-container {
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
      }

      .login-box {
        background: rgba(20, 25, 33, 0.9);
        backdrop-filter: blur(15px);
        border: 1px solid rgba(74, 158, 255, 0.2);
        border-radius: 42px;
        padding: 50px;
        width: 100%;
        max-width: 450px;
        box-shadow: 0 30px 60px -20px #000;
      }

      .login-box h1 {
        font-size: 2.2rem;
        margin-bottom: 10px;
        background: linear-gradient(135deg, #fff, #b0d4ff);
        -webkit-background-clip: text;
        background-clip: text;
        -webkit-text-fill-color: transparent;
        text-align: center;
      }

      .login-subtitle {
        text-align: center;
        color: rgba(255, 255, 255, 0.5);
        margin-bottom: 30px;
        font-size: 0.95rem;
      }

      .password-wrapper {
        position: relative;
        width: 100%;
        margin-bottom: 20px;
      }

      .password-input {
        width: 100%;
        padding: 16px 50px 16px 20px;
        background: rgba(0, 0, 0, 0.3);
        border: 1px solid rgba(74, 158, 255, 0.3);
        border-radius: 30px;
        font-size: 1.1rem;
        color: white;
        transition: all 0.3s;
      }

      .password-input:focus {
        outline: none;
        border-color: #4a9eff;
        box-shadow: 0 0 20px rgba(74, 158, 255, 0.3);
      }

      .toggle-password {
        position: absolute;
        right: 20px;
        top: 50%;
        transform: translateY(-50%);
        color: rgba(255, 255, 255, 0.5);
        cursor: pointer;
        transition: color 0.3s;
        font-size: 1.2rem;
      }

      .toggle-password:hover {
        color: #4a9eff;
      }

      .remember-me {
        display: flex;
        align-items: center;
        gap: 10px;
        margin: 15px 0;
        color: rgba(255, 255, 255, 0.7);
        font-size: 0.95rem;
      }

      .remember-me input[type="checkbox"] {
        width: 18px;
        height: 18px;
        accent-color: #4a9eff;
        cursor: pointer;
      }

      .login-btn {
        width: 100%;
        padding: 16px;
        background: linear-gradient(145deg, #1f2b3a, #111a24);
        border: 1px solid #4a9eff;
        border-radius: 30px;
        color: white;
        font-size: 1.2rem;
        font-weight: 600;
        cursor: pointer;
        transition: all 0.3s;
      }

      .login-btn:hover:not(:disabled) {
        transform: translateY(-2px);
        box-shadow: 0 10px 30px #4a9eff;
      }

      .login-btn:disabled {
        opacity: 0.5;
        cursor: not-allowed;
      }

      .attempts-info {
        text-align: center;
        margin: 15px 0;
        color: rgba(255, 255, 255, 0.5);
        font-size: 0.9rem;
      }

      .error-message {
        color: #ff6b6b;
        text-align: center;
        margin: 10px 0;
        font-size: 0.95rem;
      }

      .timer-message {
        color: #ffb83b;
        text-align: center;
        margin: 15px 0;
        font-size: 1rem;
      }

      /* === ПАНЕЛЬ УПРАВЛЕНИЯ === */
      .admin-panel {
        padding: 40px 0;
        display: none;
      }

      .admin-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 40px;
        padding: 20px 0;
        border-bottom: 1px solid rgba(255, 255, 255, 0.1);
      }

      .admin-header h2 {
        font-size: 2rem;
        background: linear-gradient(135deg, #fff, #b0d4ff);
        -webkit-background-clip: text;
        background-clip: text;
        -webkit-text-fill-color: transparent;
      }

      .logout-btn {
        padding: 10px 25px;
        background: rgba(255, 255, 255, 0.1);
        border: 1px solid rgba(255, 255, 255, 0.2);
        border-radius: 30px;
        color: white;
        cursor: pointer;
        transition: all 0.3s;
      }

      .logout-btn:hover {
        background: rgba(255, 75, 75, 0.2);
        border-color: #ff4b4b;
      }

      /* Вкладки */
      .tabs {
        display: flex;
        gap: 20px;
        margin-bottom: 40px;
        border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        padding-bottom: 10px;
      }

      .tab {
        padding: 12px 30px;
        background: transparent;
        border: none;
        color: rgba(255, 255, 255, 0.7);
        font-size: 1.1rem;
        font-weight: 500;
        cursor: pointer;
        position: relative;
        transition: color 0.3s;
      }

      .tab::after {
        content: "";
        position: absolute;
        bottom: -11px;
        left: 0;
        width: 100%;
        height: 2px;
        background: #4a9eff;
        transform: scaleX(0);
        transition: transform 0.3s;
      }

      .tab.active {
        color: #fff;
      }

      .tab.active::after {
        transform: scaleX(1);
      }

      .tab-content {
        display: none;
      }

      .tab-content.active {
        display: block;
      }

      /* Стили для белого списка (исключения) */
      .exceptions-section {
        background: rgba(20, 25, 33, 0.6);
        backdrop-filter: blur(10px);
        border-radius: 32px;
        padding: 30px;
        border: 1px solid rgba(255, 255, 255, 0.05);
      }

      .exception-tabs {
        display: flex;
        gap: 20px;
        margin-bottom: 30px;
        flex-wrap: wrap;
      }

      .tab-btn {
        padding: 12px 30px;
        background: transparent;
        border: 1px solid rgba(74, 158, 255, 0.3);
        border-radius: 30px;
        color: rgba(255, 255, 255, 0.7);
        cursor: pointer;
        transition: all 0.3s;
        font-size: 1rem;
      }

      .tab-btn.active {
        background: #4a9eff;
        border-color: #4a9eff;
        color: white;
      }

      .exception-list {
        margin-bottom: 30px;
        max-height: 400px;
        overflow-y: auto;
      }

      .exception-item {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 15px 20px;
        background: rgba(0, 0, 0, 0.2);
        border-radius: 20px;
        margin-bottom: 10px;
        border: 1px solid rgba(255, 255, 255, 0.05);
        transition: all 0.3s;
      }

      .exception-item:hover {
        border-color: rgba(74, 158, 255, 0.3);
        transform: translateX(5px);
      }

      .exception-item .path {
        font-family: monospace;
        font-size: 1rem;
        color: #b0d4ff;
      }

      .exception-item .type-badge {
        padding: 5px 12px;
        border-radius: 20px;
        font-size: 0.8rem;
        font-weight: 600;
      }

      .type-badge.file {
        background: rgba(74, 158, 255, 0.2);
        color: #4a9eff;
      }

      .type-badge.folder {
        background: rgba(160, 100, 255, 0.2);
        color: #a064ff;
      }

      .delete-exception,
      .delete-news {
        color: rgba(255, 255, 255, 0.3);
        cursor: pointer;
        transition: all 0.3s;
        font-size: 1.2rem;
      }

      .delete-exception:hover,
      .delete-news:hover {
        color: #ff4b4b;
        transform: scale(1.2);
      }

      .add-exception-form {
        display: flex;
        gap: 15px;
        margin-top: 30px;
        flex-wrap: wrap;
      }

      .exception-input {
        flex: 1;
        min-width: 250px;
        padding: 15px 20px;
        background: rgba(0, 0, 0, 0.3);
        border: 1px solid rgba(74, 158, 255, 0.3);
        border-radius: 30px;
        color: white;
        font-size: 1rem;
      }

      .type-select {
        padding: 15px 25px;
        background: rgba(0, 0, 0, 0.3);
        border: 1px solid rgba(74, 158, 255, 0.3);
        border-radius: 30px;
        color: white;
        cursor: pointer;
      }

      .add-btn {
        padding: 15px 35px;
        background: linear-gradient(145deg, #1f2b3a, #111a24);
        border: 1px solid #4a9eff;
        border-radius: 30px;
        color: white;
        cursor: pointer;
        transition: all 0.3s;
        font-weight: 600;
      }

      .add-btn:hover {
        transform: translateY(-2px);
        box-shadow: 0 10px 30px #4a9eff;
      }

      .export-data {
        margin-top: 30px;
        padding: 20px;
        background: rgba(0, 0, 0, 0.2);
        border-radius: 20px;
      }

      .export-data textarea {
        width: 100%;
        padding: 15px;
        background: rgba(0, 0, 0, 0.3);
        border: 1px solid rgba(74, 158, 255, 0.2);
        border-radius: 15px;
        color: #b0d4ff;
        font-family: monospace;
        margin: 10px 0;
        resize: vertical;
      }

      .copy-btn {
        padding: 10px 25px;
        background: rgba(74, 158, 255, 0.2);
        border: 1px solid #4a9eff;
        border-radius: 30px;
        color: white;
        cursor: pointer;
        transition: all 0.3s;
      }

      .copy-btn:hover {
        background: #4a9eff;
      }

      .action-buttons {
        display: flex;
        gap: 15px;
        margin-top: 20px;
        flex-wrap: wrap;
      }

      .download-btn {
        padding: 12px 25px;
        background: rgba(74, 158, 255, 0.2);
        border: 1px solid #4a9eff;
        border-radius: 30px;
        color: white;
        cursor: pointer;
        transition: all 0.3s;
        text-decoration: none;
        display: inline-flex;
        align-items: center;
        gap: 10px;
      }

      .download-btn:hover {
        background: #4a9eff;
        transform: translateY(-2px);
        box-shadow: 0 10px 20px #4a9eff;
      }

      /* Стили для новостей */
      .news-section {
        background: rgba(20, 25, 33, 0.6);
        backdrop-filter: blur(10px);
        border-radius: 32px;
        padding: 30px;
        border: 1px solid rgba(255, 255, 255, 0.05);
      }

      .news-list {
        margin-bottom: 30px;
        max-height: 400px;
        overflow-y: auto;
      }

      .news-item {
        padding: 20px;
        background: rgba(0, 0, 0, 0.2);
        border-radius: 20px;
        margin-bottom: 15px;
        border: 1px solid rgba(255, 255, 255, 0.05);
        transition: all 0.3s;
        cursor: pointer;
      }

      .news-item:hover {
        border-color: rgba(74, 158, 255, 0.3);
        transform: translateX(5px);
      }

      .news-item .news-title {
        font-size: 1.3rem;
        font-weight: 600;
        color: #b0d4ff;
        margin-bottom: 5px;
      }

      .news-item .news-date {
        color: #4a9eff;
        font-size: 0.85rem;
        margin-bottom: 10px;
      }

      .news-item .news-content {
        color: rgba(255, 255, 255, 0.8);
        font-size: 1rem;
      }

      .news-item .news-actions {
        display: flex;
        justify-content: flex-end;
        gap: 15px;
        margin-top: 10px;
      }

      .edit-news,
      .delete-news {
        color: rgba(255, 255, 255, 0.5);
        transition: color 0.3s;
        font-size: 1rem;
      }

      .edit-news:hover {
        color: #4a9eff;
      }

      .delete-news:hover {
        color: #ff4b4b;
      }

      .add-news-form {
        display: flex;
        flex-direction: column;
        gap: 15px;
        margin-top: 30px;
      }

      .form-row {
        display: flex;
        gap: 15px;
        flex-wrap: wrap;
      }

      .form-row .exception-input {
        flex: 1;
      }

      .news-content-input {
        width: 100%;
        padding: 15px 20px;
        background: rgba(0, 0, 0, 0.3);
        border: 1px solid rgba(74, 158, 255, 0.3);
        border-radius: 30px;
        color: white;
        font-size: 1rem;
        resize: vertical;
        min-height: 100px;
        font-family: inherit;
      }

      /* Футер */
      footer {
        border-top: 1px solid rgba(255, 255, 255, 0.03);
        padding: 35px 0;
        text-align: center;
        color: rgba(255, 255, 255, 0.35);
        font-size: 0.95rem;
        backdrop-filter: blur(8px);
        margin-top: 80px;
      }

      @media (max-width: 800px) {
        .nav-links {
          gap: 15px;
        }
        .tabs {
          flex-wrap: wrap;
        }
      }
      @media (max-width: 600px) {
        .nav-links {
          display: none;
        }
      }
    </style>
  </head>
  <body>
    <header>
      <div class="container header-content">
        <div class="logo">
          <i class="fas fa-rocket"></i>
          <span>FiercyLauncher</span>
        </div>
        <div class="nav-links">
          <a href="../">Главная</a>
          <a href="../#news">Новости</a>
          <a href="../skins/" class="nav-link-special"
            ><i class="fas fa-tshirt"></i> Скины</a
          >
          <a
            href="../moder/"
            class="nav-link-special"
            style="background: rgba(74, 158, 255, 0.2); border-color: #4a9eff"
            ><i class="fas fa-shield-alt"></i> Модерация</a
          >
          <a
            href="../money/"
            class="nav-link-special"
            style="background: rgba(255, 215, 0, 0.15); border-color: gold"
            ><i class="fas fa-coins"></i> Fiercy Money</a
          >
        </div>
      </div>
    </header>

    <main>
      <div class="container">
        <!-- КОНТЕЙНЕР ЛОГИНА -->
        <div id="loginContainer" class="login-container">
          <div class="login-box">
            <h1><i class="fas fa-shield-alt"></i> Панель модерации</h1>
            <div class="login-subtitle">Введите пароль для доступа</div>

            <div class="password-wrapper">
              <input
                type="password"
                id="passwordInput"
                class="password-input"
                placeholder="Пароль"
                maxlength="50"
                autocomplete="current-password"
              />
              <i class="fas fa-eye toggle-password" id="togglePassword"></i>
            </div>

            <div class="remember-me">
              <input type="checkbox" id="rememberMe" />
              <label for="rememberMe">Запомнить меня</label>
            </div>

            <button id="loginBtn" class="login-btn">Войти</button>

            <div id="attemptsInfo" class="attempts-info">
              Осталось попыток: 3
            </div>
            <div id="errorMessage" class="error-message"></div>
            <div id="timerMessage" class="timer-message"></div>
          </div>
        </div>

        <!-- ПАНЕЛЬ УПРАВЛЕНИЯ (скрыта до входа) -->
        <div id="adminPanel" class="admin-panel">
          <div class="admin-header">
            <h2><i class="fas fa-cog"></i> Управление</h2>
            <button id="logoutBtn" class="logout-btn">
              <i class="fas fa-sign-out-alt"></i> Выйти
            </button>
          </div>

          <!-- Вкладки -->
          <div class="tabs">
            <button class="tab active" data-tab="whitelist">
              Белый список
            </button>
            <button class="tab" data-tab="news">Новости</button>
          </div>

          <!-- Вкладка Белый список -->
          <div id="whitelistTab" class="tab-content active">
            <div class="exceptions-section">
              <h3>Список исключений лаунчера</h3>
              <div class="exception-tabs">
                <button class="tab-btn active" data-type="all">Все</button>
                <button class="tab-btn" data-type="file">Файлы</button>
                <button class="tab-btn" data-type="folder">Папки</button>
              </div>

              <div id="exceptionsList" class="exception-list"></div>

              <div class="add-exception-form">
                <input
                  type="text"
                  id="newExceptionPath"
                  class="exception-input"
                  placeholder="Путь к файлу или папке"
                />
                <select id="newExceptionType" class="type-select">
                  <option value="file">Файл</option>
                  <option value="folder">Папка</option>
                </select>
                <button id="addExceptionBtn" class="add-btn">
                  <i class="fas fa-plus"></i> Добавить
                </button>
              </div>

              <div class="export-data">
                <h4>Экспорт данных для лаунчера</h4>
                <textarea id="exportJson" rows="5" readonly></textarea>
                <div class="action-buttons">
                  <button id="copyJsonBtn" class="copy-btn">
                    <i class="fas fa-copy"></i> Копировать
                  </button>
                  <button id="downloadJsonBtn" class="download-btn">
                    <i class="fas fa-download"></i> Скачать JSON
                  </button>
                  <button id="loadFromFileBtn" class="download-btn">
                    <i class="fas fa-upload"></i> Загрузить JSON
                  </button>
                </div>
                <input
                  type="file"
                  id="fileInput"
                  accept=".json"
                  style="display: none"
                />
              </div>
            </div>
          </div>

          <!-- Вкладка Новости -->
          <div id="newsTab" class="tab-content">
            <div class="news-section">
              <h3>Управление новостями</h3>

              <div id="newsList" class="news-list"></div>

              <div class="add-news-form">
                <div class="form-row">
                  <input
                    type="text"
                    id="newsTitle"
                    class="exception-input"
                    placeholder="Заголовок новости"
                  />
                  <input
                    type="date"
                    id="newsDate"
                    class="exception-input"
                    value="2026-03-20"
                  />
                </div>
                <textarea
                  id="newsContent"
                  class="news-content-input"
                  placeholder="Текст новости..."
                ></textarea>
                <div class="action-buttons" style="justify-content: center">
                  <button id="addNewsBtn" class="add-btn">
                    <i class="fas fa-plus"></i> Добавить / Обновить
                  </button>
                  <button id="clearNewsFormBtn" class="copy-btn">
                    <i class="fas fa-undo"></i> Очистить
                  </button>
                </div>
                <div
                  class="action-buttons"
                  style="justify-content: center; margin-top: 20px"
                >
                  <button
                    id="saveNewsBtn"
                    class="download-btn"
                    style="
                      background: rgba(255, 215, 0, 0.2);
                      border-color: gold;
                    "
                  >
                    <i class="fas fa-save"></i> Сохранить в репозиторий
                  </button>
                  <button id="loadNewsBtn" class="download-btn">
                    <i class="fas fa-sync"></i> Загрузить из репозитория
                  </button>
                </div>
              </div>
            </div>
          </div>
        </div>
      </div>
    </main>

    <footer>
      <div class="container">
        <p>© 2026 FIERCY LAUNCHER. Все права защищены.</p>
        <p style="margin-top: 12px">
          <i class="fab fa-discord"></i>
          <i class="fab fa-telegram"></i>
          <i class="fab fa-github"></i>
        </p>
      </div>
    </footer>

    <script>
      // ========== НАСТРОЙКИ ==========
      const ADMIN_PASSWORD = "admin12345";
      const LOCK_TIME = 2 * 60 * 1000;
      const GITHUB_TOKEN = "%%GH_TOKEN%%"; // заменится при деплое
      const GITHUB_REPO = "MENDI213/FiercyLauncher";

      // ========== СОСТОЯНИЕ ==========
      let attemptsLeft = 3;
      let lockUntil = null;
      let exceptions = { files: [], folders: [] };
      let news = [];
      let editingIndex = -1; // для редактирования новости

      // ========== ЛОГИКА ВХОДА ==========
      function checkLock() {
        if (lockUntil && Date.now() < lockUntil) {
          const remainingSeconds = Math.ceil((lockUntil - Date.now()) / 1000);
          const minutes = Math.floor(remainingSeconds / 60);
          const seconds = remainingSeconds % 60;
          document.getElementById("loginBtn").disabled = true;
          document.getElementById("passwordInput").disabled = true;
          document.getElementById("timerMessage").textContent =
            `Доступ заблокирован. Подожди ${minutes}:${seconds.toString().padStart(2, "0")}`;
          setTimeout(checkLock, 1000);
          return true;
        } else {
          document.getElementById("loginBtn").disabled = false;
          document.getElementById("passwordInput").disabled = false;
          document.getElementById("timerMessage").textContent = "";
          lockUntil = null;
          return false;
        }
      }

      function handleLogin() {
        if (checkLock()) return;

        const password = document.getElementById("passwordInput").value;

        if (password === ADMIN_PASSWORD) {
          document.getElementById("loginContainer").style.display = "none";
          document.getElementById("adminPanel").style.display = "block";
          attemptsLeft = 3;
          document.getElementById("attemptsInfo").textContent =
            "Осталось попыток: 3";
          document.getElementById("errorMessage").textContent = "";
          document.getElementById("passwordInput").value = "";

          // Загружаем данные
          loadExceptions();
          loadNewsFromRepo();

          // Запоминаем пароль, если чекбокс отмечен
          if (document.getElementById("rememberMe").checked) {
            localStorage.setItem("rememberedPassword", password);
          } else {
            localStorage.removeItem("rememberedPassword");
          }
        } else {
          attemptsLeft--;
          document.getElementById("attemptsInfo").textContent =
            `Осталось попыток: ${attemptsLeft}`;
          document.getElementById("errorMessage").textContent =
            "Неверный пароль";

          if (attemptsLeft <= 0) {
            lockUntil = Date.now() + LOCK_TIME;
            attemptsLeft = 3;
            checkLock();
          }
        }
      }

      // ========== БЕЛЫЙ СПИСОК (исключения) ==========
      function loadExceptions() {
        const saved = localStorage.getItem("fiercy_exceptions");
        if (saved) {
          try {
            exceptions = JSON.parse(saved);
          } catch (e) {
            exceptions = { files: [], folders: [] };
          }
        } else {
          exceptions = {
            files: [
              "C:/Program Files/MyGame/config.ini",
              "D:/Games/launcher_settings.cfg",
            ],
            folders: [
              "C:/Users/User/AppData/Roaming/MyGame/mods",
              "D:/GameData/cache",
            ],
          };
          saveExceptions();
        }
        renderExceptions();
        updateExportJson();
      }

      function saveExceptions() {
        localStorage.setItem("fiercy_exceptions", JSON.stringify(exceptions));
        updateExportJson();
      }

      function addException(path, type) {
        if (!path.trim()) {
          alert("Введите путь");
          return false;
        }
        if (type === "file") {
          if (!exceptions.files.includes(path)) {
            exceptions.files.push(path);
          } else {
            alert("Такой файл уже есть");
            return false;
          }
        } else {
          if (!exceptions.folders.includes(path)) {
            exceptions.folders.push(path);
          } else {
            alert("Такая папка уже есть");
            return false;
          }
        }
        saveExceptions();
        renderExceptions();
        return true;
      }

      function deleteException(path, type) {
        if (confirm(`Удалить ${path}?`)) {
          if (type === "file") {
            exceptions.files = exceptions.files.filter((f) => f !== path);
          } else {
            exceptions.folders = exceptions.folders.filter((f) => f !== path);
          }
          saveExceptions();
          renderExceptions();
        }
      }

      function renderExceptions(filterType = "all") {
        const listElement = document.getElementById("exceptionsList");
        if (!listElement) return;
        let html = "";
        if (filterType === "all" || filterType === "file") {
          exceptions.files.forEach((file) => {
            html += `
                        <div class="exception-item">
                            <span class="path">${file}</span>
                            <span class="type-badge file">Файл</span>
                            <i class="fas fa-times delete-exception" data-path="${file}" data-type="file"></i>
                        </div>
                    `;
          });
        }
        if (filterType === "all" || filterType === "folder") {
          exceptions.folders.forEach((folder) => {
            html += `
                        <div class="exception-item">
                            <span class="path">${folder}</span>
                            <span class="type-badge folder">Папка</span>
                            <i class="fas fa-times delete-exception" data-path="${folder}" data-type="folder"></i>
                        </div>
                    `;
          });
        }
        if (html === "") {
          html =
            '<div style="text-align: center; padding: 40px; color: rgba(255,255,255,0.3);">Нет исключений</div>';
        }
        listElement.innerHTML = html;

        document.querySelectorAll(".delete-exception").forEach((btn) => {
          btn.addEventListener("click", (e) => {
            const path = e.target.dataset.path;
            const type = e.target.dataset.type;
            deleteException(path, type);
          });
        });
      }

      function updateExportJson() {
        const exportElement = document.getElementById("exportJson");
        if (exportElement) {
          exportElement.value = JSON.stringify(exceptions, null, 2);
        }
      }

      function downloadJson() {
        const dataStr = JSON.stringify(exceptions, null, 2);
        const dataUri =
          "data:application/json;charset=utf-8," + encodeURIComponent(dataStr);
        const link = document.createElement("a");
        link.setAttribute("href", dataUri);
        link.setAttribute("download", "exceptions.json");
        link.click();
      }

      function loadFromFile(file) {
        const reader = new FileReader();
        reader.onload = function (e) {
          try {
            const content = JSON.parse(e.target.result);
            if (content.files && content.folders) {
              exceptions = content;
              saveExceptions();
              renderExceptions();
              alert("Данные загружены из файла");
            } else {
              alert("Неверный формат файла");
            }
          } catch (error) {
            alert("Ошибка при чтении файла");
          }
        };
        reader.readAsText(file);
      }

      // ========== НОВОСТИ ==========
      async function loadNewsFromRepo() {
        try {
          const response = await fetch(
            `https://api.github.com/repos/${GITHUB_REPO}/contents/news.json`,
            {
              headers: {
                Authorization: `token ${GITHUB_TOKEN}`,
                Accept: "application/vnd.github.v3+json",
              },
            },
          );
          if (response.ok) {
            const data = await response.json();
            const content = atob(data.content);
            news = JSON.parse(content);
          } else if (response.status === 404) {
            news = [];
          } else {
            const err = await response.json();
            throw new Error(err.message || "Ошибка загрузки новостей");
          }
        } catch (error) {
          console.error("Не удалось загрузить новости:", error);
          news = [];
        }
        renderNews();
      }

      function renderNews() {
        const list = document.getElementById("newsList");
        if (!list) return;
        list.innerHTML = news
          .map(
            (item, index) => `
                <div class="news-item" data-index="${index}">
                    <div class="news-title">${item.title}</div>
                    <div class="news-date">${item.date}</div>
                    <div class="news-content">${item.content}</div>
                    <div class="news-actions">
                        <i class="fas fa-edit edit-news" data-index="${index}" title="Редактировать"></i>
                        <i class="fas fa-times delete-news" data-index="${index}" title="Удалить"></i>
                    </div>
                </div>
            `,
          )
          .join("");

        document.querySelectorAll(".edit-news").forEach((btn) => {
          btn.addEventListener("click", (e) => {
            e.stopPropagation();
            const index = e.target.dataset.index;
            editNews(index);
          });
        });

        document.querySelectorAll(".delete-news").forEach((btn) => {
          btn.addEventListener("click", (e) => {
            e.stopPropagation();
            const index = e.target.dataset.index;
            if (confirm("Удалить новость?")) {
              news.splice(index, 1);
              renderNews();
              clearNewsForm();
            }
          });
        });
      }

      function editNews(index) {
        const item = news[index];
        document.getElementById("newsTitle").value = item.title;
        document.getElementById("newsDate").value = item.date;
        document.getElementById("newsContent").value = item.content;
        editingIndex = index;
      }

      function clearNewsForm() {
        document.getElementById("newsTitle").value = "";
        document.getElementById("newsDate").value = new Date()
          .toISOString()
          .split("T")[0];
        document.getElementById("newsContent").value = "";
        editingIndex = -1;
      }

      function addOrUpdateNews() {
        const title = document.getElementById("newsTitle").value.trim();
        const date = document.getElementById("newsDate").value;
        const content = document.getElementById("newsContent").value.trim();
        if (!title || !date || !content) {
          alert("Заполните все поля");
          return;
        }
        if (editingIndex >= 0) {
          news[editingIndex] = { title, date, content };
        } else {
          news.push({ title, date, content });
        }
        renderNews();
        clearNewsForm();
      }

      async function saveNewsToRepo() {
        if (!confirm("Сохранить новости в репозиторий?")) return;

        const content = btoa(
          unescape(encodeURIComponent(JSON.stringify(news, null, 2))),
        );
        let sha = null;

        try {
          const check = await fetch(
            `https://api.github.com/repos/${GITHUB_REPO}/contents/news.json`,
            {
              headers: {
                Authorization: `token ${GITHUB_TOKEN}`,
                Accept: "application/vnd.github.v3+json",
              },
            },
          );
          if (check.ok) {
            const data = await check.json();
            sha = data.sha;
          }
        } catch (e) {
          /* игнорируем */
        }

        const body = {
          message: "Обновление новостей",
          content: content,
        };
        if (sha) body.sha = sha;

        try {
          const response = await fetch(
            `https://api.github.com/repos/${GITHUB_REPO}/contents/news.json`,
            {
              method: "PUT",
              headers: {
                Authorization: `token ${GITHUB_TOKEN}`,
                "Content-Type": "application/json",
                Accept: "application/vnd.github.v3+json",
              },
              body: JSON.stringify(body),
            },
          );
          if (response.ok) {
            alert("Новости успешно сохранены!");
          } else {
            const err = await response.json();
            alert("Ошибка: " + err.message);
          }
        } catch (error) {
          alert("Ошибка сети: " + error.message);
        }
      }

      // ========== ИНИЦИАЛИЗАЦИЯ ==========
      document.addEventListener("DOMContentLoaded", () => {
        // Восстановление пароля
        const remembered = localStorage.getItem("rememberedPassword");
        if (remembered) {
          document.getElementById("passwordInput").value = remembered;
          document.getElementById("rememberMe").checked = true;
        }

        // Глазик
        document
          .getElementById("togglePassword")
          .addEventListener("click", function () {
            const input = document.getElementById("passwordInput");
            const type =
              input.getAttribute("type") === "password" ? "text" : "password";
            input.setAttribute("type", type);
            this.classList.toggle("fa-eye");
            this.classList.toggle("fa-eye-slash");
          });

        // Логин
        document
          .getElementById("loginBtn")
          .addEventListener("click", handleLogin);
        document
          .getElementById("passwordInput")
          .addEventListener("keypress", (e) => {
            if (e.key === "Enter") handleLogin();
          });

        // Выход
        document.getElementById("logoutBtn").addEventListener("click", () => {
          document.getElementById("loginContainer").style.display = "flex";
          document.getElementById("adminPanel").style.display = "none";
        });

        // Переключение вкладок
        document.querySelectorAll(".tab").forEach((tab) => {
          tab.addEventListener("click", () => {
            document
              .querySelectorAll(".tab")
              .forEach((t) => t.classList.remove("active"));
            document
              .querySelectorAll(".tab-content")
              .forEach((c) => c.classList.remove("active"));
            tab.classList.add("active");
            document
              .getElementById(tab.dataset.tab + "Tab")
              .classList.add("active");
          });
        });

        // Белый список
        document
          .getElementById("addExceptionBtn")
          .addEventListener("click", () => {
            const path = document.getElementById("newExceptionPath").value;
            const type = document.getElementById("newExceptionType").value;
            if (addException(path, type)) {
              document.getElementById("newExceptionPath").value = "";
            }
          });

        document.querySelectorAll(".exception-tabs .tab-btn").forEach((btn) => {
          btn.addEventListener("click", (e) => {
            document
              .querySelectorAll(".exception-tabs .tab-btn")
              .forEach((b) => b.classList.remove("active"));
            e.target.classList.add("active");
            renderExceptions(e.target.dataset.type);
          });
        });

        document.getElementById("copyJsonBtn").addEventListener("click", () => {
          const json = document.getElementById("exportJson");
          json.select();
          document.execCommand("copy");
          alert("JSON скопирован");
        });

        document
          .getElementById("downloadJsonBtn")
          .addEventListener("click", downloadJson);
        document
          .getElementById("loadFromFileBtn")
          .addEventListener("click", () => {
            document.getElementById("fileInput").click();
          });
        document.getElementById("fileInput").addEventListener("change", (e) => {
          if (e.target.files.length > 0) {
            loadFromFile(e.target.files[0]);
          }
        });

        // Новости
        document
          .getElementById("addNewsBtn")
          .addEventListener("click", addOrUpdateNews);
        document
          .getElementById("clearNewsFormBtn")
          .addEventListener("click", clearNewsForm);
        document
          .getElementById("saveNewsBtn")
          .addEventListener("click", saveNewsToRepo);
        document
          .getElementById("loadNewsBtn")
          .addEventListener("click", loadNewsFromRepo);

        checkLock();
      });
    </script>
  </body>
</html>
