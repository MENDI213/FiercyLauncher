<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FiercyLauncher | Галерея скинов</title>
    <!-- Подключаем шрифт Inter и Font Awesome для иконок -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700;14..32,800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        /* ========== ОСНОВНЫЕ СТИЛИ (как на главной) ========== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: #0a0c0f;
            color: #fff;
            line-height: 1.6;
            overflow-x: hidden;
        }

        body::before {
            content: "";
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at 30% 40%, rgba(70, 130, 200, 0.15) 0%, transparent 40%),
                        radial-gradient(circle at 70% 60%, rgba(150, 60, 200, 0.12) 0%, transparent 45%),
                        radial-gradient(circle at 10% 80%, rgba(30, 150, 220, 0.1) 0%, transparent 50%);
            z-index: -2;
            animation: backgroundShift 18s ease-in-out infinite alternate;
        }

        @keyframes backgroundShift {
            0% { opacity: 0.7; transform: scale(1); }
            100% { opacity: 1; transform: scale(1.05); }
        }

        body::after {
            content: "";
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.65' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.03'/%3E%3C/svg%3E");
            z-index: -1;
            pointer-events: none;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 0 30px;
        }

        /* Анимации */
        @keyframes fadeUp {
            0% { opacity: 0; transform: translateY(30px); }
            100% { opacity: 1; transform: translateY(0); }
        }

        .animate-fade-up {
            animation: fadeUp 0.9s cubic-bezier(0.2, 0.9, 0.3, 1) forwards;
            opacity: 0;
        }

        .delay-1 { animation-delay: 0.2s; }
        .delay-2 { animation-delay: 0.4s; }
        .delay-3 { animation-delay: 0.6s; }

        /* Хедер (как на главной) */
        header {
            padding: 25px 0;
            backdrop-filter: blur(12px);
            background: rgba(10, 12, 15, 0.4);
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .header-content {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 1.7rem;
            font-weight: 800;
            letter-spacing: -0.5px;
        }

        .logo i {
            color: #4a9eff;
            font-size: 2rem;
            filter: drop-shadow(0 0 10px rgba(74, 158, 255, 0.6));
        }

        .logo span {
            background: linear-gradient(135deg, #fff, #b0d0ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .nav-links {
            display: flex;
            gap: 25px;
            font-weight: 500;
            align-items: center;
        }

        .nav-links a {
            color: rgba(255, 255, 255, 0.75);
            text-decoration: none;
            font-size: 1rem;
            transition: color 0.3s, text-shadow 0.3s;
            position: relative;
            padding: 5px 0;
        }

        .nav-links a::after {
            content: '';
            position: absolute;
            bottom: -5px;
            left: 0;
            width: 0;
            height: 2px;
            background: linear-gradient(90deg, #4a9eff, #a96eff);
            transition: width 0.3s ease;
        }

        .nav-links a:hover {
            color: #fff;
            text-shadow: 0 0 8px rgba(74, 158, 255, 0.5);
        }

        .nav-links a:hover::after {
            width: 100%;
        }

        .nav-link-special {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            background: rgba(74, 158, 255, 0.1);
            border: 1px solid rgba(74, 158, 255, 0.3);
            border-radius: 30px;
            padding: 8px 18px !important;
            margin-left: 5px;
        }

        .nav-link-special i {
            color: #4a9eff;
            font-size: 1rem;
        }

        .nav-link-special:hover {
            background: rgba(74, 158, 255, 0.2);
            border-color: #4a9eff;
            transform: translateY(-2px);
        }

        .nav-link-special:hover::after {
            display: none;
        }

        /* ========== СПЕЦИАЛЬНЫЕ СТИЛИ ДЛЯ СТРАНИЦЫ СКИНОВ ========== */
        
        /* Заголовок страницы */
        .page-header {
            padding: 60px 0 40px;
            text-align: center;
        }

        .page-header h1 {
            font-size: 3.5rem;
            font-weight: 800;
            background: linear-gradient(135deg, #fff, #b0d4ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 15px;
        }

        .page-header p {
            color: rgba(255,255,255,0.6);
            font-size: 1.2rem;
            max-width: 600px;
            margin: 0 auto;
        }

        /* Кнопка загрузки */
        .upload-section {
            display: flex;
            justify-content: center;
            margin-bottom: 50px;
        }

        .upload-btn {
            display: inline-flex;
            align-items: center;
            gap: 15px;
            background: linear-gradient(145deg, #1f2b3a, #111a24);
            border: 2px solid #4a9eff;
            padding: 18px 40px;
            border-radius: 60px;
            font-size: 1.3rem;
            font-weight: 600;
            color: white;
            cursor: pointer;
            transition: all 0.3s;
            box-shadow: 0 10px 30px rgba(74,158,255,0.3);
            position: relative;
            overflow: hidden;
        }

        .upload-btn i {
            font-size: 1.5rem;
            color: #4a9eff;
            transition: transform 0.3s;
        }

        .upload-btn:hover {
            transform: translateY(-3px) scale(1.02);
            box-shadow: 0 20px 40px #4a9eff;
        }

        .upload-btn:hover i {
            transform: rotate(10deg);
        }

        .upload-btn:active {
            transform: translateY(0);
        }

        .upload-btn input {
            position: absolute;
            left: 0;
            top: 0;
            opacity: 0;
            width: 100%;
            height: 100%;
            cursor: pointer;
        }

        /* Статистика */
        .stats-bar {
            display: flex;
            justify-content: center;
            gap: 50px;
            margin-bottom: 50px;
            padding: 20px;
            background: rgba(20,25,33,0.5);
            backdrop-filter: blur(10px);
            border-radius: 60px;
            border: 1px solid rgba(74,158,255,0.2);
        }

        .stat-item {
            text-align: center;
        }

        .stat-value {
            font-size: 2rem;
            font-weight: 700;
            color: #4a9eff;
        }

        .stat-label {
            color: rgba(255,255,255,0.6);
            font-size: 0.9rem;
        }

        /* Галерея скинов */
        .skins-gallery {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 25px;
            margin-bottom: 60px;
        }

        .skin-card {
            background: rgba(20, 25, 33, 0.7);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(74, 158, 255, 0.2);
            border-radius: 30px;
            padding: 25px 15px 15px;
            transition: all 0.4s;
            position: relative;
            overflow: hidden;
            cursor: pointer;
        }

        .skin-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 3px;
            background: linear-gradient(90deg, #4a9eff, #a96eff);
            transform: translateX(-100%);
            transition: transform 0.6s;
        }

        .skin-card:hover {
            transform: translateY(-10px);
            border-color: #4a9eff;
            box-shadow: 0 20px 40px rgba(74,158,255,0.3);
        }

        .skin-card:hover::before {
            transform: translateX(100%);
        }

        .skin-preview {
            width: 120px;
            height: 120px;
            margin: 0 auto 15px;
            background: rgba(0,0,0,0.3);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 2px solid #4a9eff;
            overflow: hidden;
        }

        .skin-preview img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            image-rendering: pixelated;
        }

        .skin-preview i {
            font-size: 3rem;
            color: #4a9eff;
            opacity: 0.5;
        }

        .skin-info {
            text-align: center;
        }

        .skin-name {
            font-size: 1.3rem;
            font-weight: 600;
            margin-bottom: 5px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .skin-author {
            color: rgba(255,255,255,0.5);
            font-size: 0.9rem;
            margin-bottom: 10px;
        }

        .skin-size {
            font-size: 0.8rem;
            color: #4a9eff;
            background: rgba(74,158,255,0.1);
            display: inline-block;
            padding: 3px 12px;
            border-radius: 30px;
            margin-bottom: 10px;
        }

        .skin-actions {
            display: flex;
            justify-content: center;
            gap: 10px;
            opacity: 0;
            transform: translateY(10px);
            transition: all 0.3s;
        }

        .skin-card:hover .skin-actions {
            opacity: 1;
            transform: translateY(0);
        }

        .skin-action-btn {
            background: transparent;
            border: 1px solid rgba(74,158,255,0.5);
            color: white;
            width: 35px;
            height: 35px;
            border-radius: 50%;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .skin-action-btn:hover {
            background: #4a9eff;
            transform: scale(1.1);
        }

        .skin-action-btn.delete:hover {
            background: #ff4b4b;
            border-color: #ff4b4b;
        }

        /* Пагинация */
        .pagination {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin: 60px 0;
        }

        .page-btn {
            width: 45px;
            height: 45px;
            border-radius: 50%;
            background: rgba(20,25,33,0.7);
            border: 1px solid rgba(74,158,255,0.3);
            color: white;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .page-btn:hover {
            background: #4a9eff;
            transform: scale(1.1);
        }

        .page-btn.active {
            background: #4a9eff;
            border-color: #4a9eff;
        }

        /* Модальное окно для 3D просмотра */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.9);
            backdrop-filter: blur(10px);
            z-index: 1000;
            align-items: center;
            justify-content: center;
        }

        .modal.active {
            display: flex;
        }

        .modal-content {
            width: 90%;
            max-width: 800px;
            background: rgba(20,25,33,0.9);
            border: 2px solid #4a9eff;
            border-radius: 50px;
            padding: 30px;
            position: relative;
        }

        .modal-close {
            position: absolute;
            top: 20px;
            right: 20px;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: rgba(255,255,255,0.1);
            border: 1px solid #4a9eff;
            color: white;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s;
        }

        .modal-close:hover {
            background: #ff4b4b;
            border-color: #ff4b4b;
            transform: rotate(90deg);
        }

        .modal-viewer {
            width: 100%;
            height: 500px;
            background: rgba(0,0,0,0.3);
            border-radius: 30px;
            overflow: hidden;
        }

        /* Загрузка */
        .loading {
            text-align: center;
            padding: 60px;
            color: #4a9eff;
            font-size: 1.5rem;
        }

        .loading i {
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        /* Сообщения */
        .message {
            position: fixed;
            top: 100px;
            right: 30px;
            padding: 15px 30px;
            background: rgba(20,25,33,0.9);
            border: 2px solid #4a9eff;
            border-radius: 30px;
            color: white;
            z-index: 1000;
            animation: slideIn 0.3s;
            backdrop-filter: blur(10px);
        }

        .message.error {
            border-color: #ff4b4b;
        }

        .message.success {
            border-color: #00ff88;
        }

        @keyframes slideIn {
            from { transform: translateX(100%); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }

        /* Футер */
        footer {
            border-top: 1px solid rgba(255,255,255,0.03);
            padding: 35px 0;
            text-align: center;
            color: rgba(255,255,255,0.35);
            font-size: 0.95rem;
            backdrop-filter: blur(8px);
            margin-top: 60px;
        }

        /* Адаптивность */
        @media (max-width: 1200px) {
            .skins-gallery {
                grid-template-columns: repeat(4, 1fr);
            }
        }

        @media (max-width: 900px) {
            .skins-gallery {
                grid-template-columns: repeat(3, 1fr);
            }
        }

        @media (max-width: 600px) {
            .skins-gallery {
                grid-template-columns: repeat(2, 1fr);
            }
            
            .page-header h1 {
                font-size: 2.5rem;
            }
            
            .stats-bar {
                flex-direction: column;
                gap: 20px;
                border-radius: 30px;
            }
            
            .nav-links {
                display: none;
            }
        }
    </style>
</head>
<body>
    <header>
        <div class="container header-content">
            <div class="logo animate-fade-in">
                <i class="fas fa-rocket"></i>
                <span>FiercyLauncher</span>
            </div>
            <div class="nav-links animate-fade-in delay-1">
                <a href="../">Главная</a>
                <a href="#">Возможности</a>
                <a href="../#reviews">Отзывы</a>
                <a href="#">Поддержка</a>
                <a href="#">Сообщество</a>
                <a href="index.html" class="nav-link-special">
                    <i class="fas fa-tshirt"></i> Скины
                </a>
                <a href="../moder/" class="nav-link-special">
                    <i class="fas fa-shield-alt"></i> Модерация
                </a>
            </div>
        </div>
    </header>

    <main>
        <div class="container">
            <!-- Заголовок страницы -->
            <div class="page-header animate-fade-up">
                <h1><i class="fas fa-tshirt"></i> Галерея скинов</h1>
                <p>Загружай свои скины и смотри их в 3D прямо в браузере</p>
            </div>

            <!-- Кнопка загрузки -->
            <div class="upload-section animate-fade-up delay-1">
                <div class="upload-btn">
                    <i class="fas fa-cloud-upload-alt"></i>
                    Загрузить скин (до 5 МБ)
                    <input type="file" id="skinUpload" accept=".png,.jpg,.jpeg" max-size="5242880">
                </div>
            </div>

            <!-- Статистика -->
            <div class="stats-bar animate-fade-up delay-2">
                <div class="stat-item">
                    <div class="stat-value" id="totalSkins">0</div>
                    <div class="stat-label">Всего скинов</div>
                </div>
                <div class="stat-item">
                    <div class="stat-value" id="totalSize">0 МБ</div>
                    <div class="stat-label">Общий размер</div>
                </div>
                <div class="stat-item">
                    <div class="stat-value" id="lastUpdate">-</div>
                    <div class="stat-label">Последнее обновление</div>
                </div>
            </div>

            <!-- Галерея скинов -->
            <div id="skinsGallery" class="skins-gallery animate-fade-up delay-3">
                <!-- Скины будут загружаться сюда -->
                <div class="loading">
                    <i class="fas fa-spinner"></i> Загрузка скинов...
                </div>
            </div>

            <!-- Пагинация -->
            <div class="pagination" id="pagination">
                <!-- Пагинация будет здесь -->
            </div>
        </div>
    </main>

    <!-- Модальное окно для 3D просмотра -->
    <div class="modal" id="skinModal">
        <div class="modal-content">
            <button class="modal-close" id="closeModal"><i class="fas fa-times"></i></button>
            <div class="modal-viewer" id="modalViewer"></div>
        </div>
    </div>

    <footer>
        <div class="container">
            <p>© 2026 FIERCY LAUNCHER. Все права защищены.</p>
            <p style="margin-top: 12px;">
                <i class="fab fa-discord" style="margin: 0 10px; opacity: 0.6; transition: 0.2s;"></i>
                <i class="fab fa-telegram" style="margin: 0 10px; opacity: 0.6; transition: 0.2s;"></i>
                <i class="fab fa-github" style="margin: 0 10px; opacity: 0.6; transition: 0.2s;"></i>
            </p>
        </div>
    </footer>

    <!-- Подключаем Three.js -->
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.128.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.128.0/examples/jsm/"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

        // ========== КОНФИГУРАЦИЯ ==========
        const SKINS_JSON_URL = 'https://mendi213.github.io/FiercyLauncher/skins/skins.json';
        const SKINS_BASE_URL = 'https://mendi213.github.io/FiercyLauncher/skins/';
        const MAX_FILE_SIZE = 5 * 1024 * 1024; // 5 МБ
        
        // ========== СОСТОЯНИЕ ==========
        let allSkins = [];
        let currentPage = 1;
        const SKINS_PER_PAGE = 10; // 5 в ряд x 2 ряда = 10
        
        // ========== ВСПОМОГАТЕЛЬНЫЕ ФУНКЦИИ ==========
        
        // Показать сообщение
        function showMessage(text, type = 'info') {
            const msg = document.createElement('div');
            msg.className = `message ${type}`;
            msg.textContent = text;
            document.body.appendChild(msg);
            
            setTimeout(() => {
                msg.remove();
            }, 3000);
        }
        
        // Форматировать размер
        function formatSize(bytes) {
            if (bytes === 0) return '0 Б';
            const k = 1024;
            const sizes = ['Б', 'КБ', 'МБ'];
            const i = Math.floor(Math.log(bytes) / Math.log(k));
            return parseFloat((bytes / Math.pow(k, i)).toFixed(2)) + ' ' + sizes[i];
        }
        
        // ========== РАБОТА С GITHUB API ==========
        
        // Загрузить список скинов
        async function loadSkins() {
            try {
                const response = await fetch(SKINS_JSON_URL + '?t=' + Date.now());
                const data = await response.json();
                allSkins = data.skins || [];
                updateStats();
                renderGallery();
            } catch (error) {
                console.error('Ошибка загрузки скинов:', error);
                document.getElementById('skinsGallery').innerHTML = 
                    '<div style="text-align: center; padding: 60px; color: #ff4b4b;">' +
                    '<i class="fas fa-exclamation-triangle"></i> Ошибка загрузки скинов</div>';
            }
        }
        
        // Обновить статистику
        function updateStats() {
            document.getElementById('totalSkins').textContent = allSkins.length;
            
            // Общий размер (в реальности нужно получать с сервера)
            const totalSize = allSkins.reduce((acc, skin) => acc + (skin.size || 0), 0);
            document.getElementById('totalSize').textContent = formatSize(totalSize);
            
            // Последнее обновление
            if (allSkins.length > 0) {
                const dates = allSkins.map(s => new Date(s.date || 0));
                const lastDate = new Date(Math.max(...dates));
                document.getElementById('lastUpdate').textContent = 
                    lastDate.toLocaleDateString('ru-RU');
            }
        }
        
        // Отрендерить галерею
        function renderGallery() {
            const gallery = document.getElementById('skinsGallery');
            
            if (allSkins.length === 0) {
                gallery.innerHTML = `
                    <div style="text-align: center; padding: 60px; grid-column: 1/-1; color: rgba(255,255,255,0.5);">
                        <i class="fas fa-tshirt" style="font-size: 4rem; margin-bottom: 20px; opacity: 0.3;"></i>
                        <p>Нет загруженных скинов</p>
                        <p style="font-size: 0.9rem;">Загрузи свой первый скин!</p>
                    </div>
                `;
                return;
            }
            
            // Пагинация
            const start = (currentPage - 1) * SKINS_PER_PAGE;
            const end = start + SKINS_PER_PAGE;
            const pageSkins = allSkins.slice(start, end);
            
            let html = '';
            pageSkins.forEach(skin => {
                html += `
                    <div class="skin-card" data-id="${skin.id}">
                        <div class="skin-preview">
                            <img src="${SKINS_BASE_URL + skin.file}" alt="${skin.name}" 
                                 onerror="this.onerror=null; this.src=''; this.parentNode.innerHTML='<i class=\\'fas fa-user\\'></i>';">
                        </div>
                        <div class="skin-info">
                            <div class="skin-name">${skin.name}</div>
                            <div class="skin-author">by ${skin.author || 'Unknown'}</div>
                            <div class="skin-size">${formatSize(skin.size || 0)}</div>
                            <div class="skin-actions">
                                <button class="skin-action-btn view-3d" title="Посмотреть в 3D">
                                    <i class="fas fa-cube"></i>
                                </button>
                                <button class="skin-action-btn download" title="Скачать">
                                    <i class="fas fa-download"></i>
                                </button>
                                <button class="skin-action-btn delete" title="Удалить">
                                    <i class="fas fa-trash"></i>
                                </button>
                            </div>
                        </div>
                    </div>
                `;
            });
            
            gallery.innerHTML = html;
            
            // Добавляем обработчики
            document.querySelectorAll('.view-3d').forEach((btn, index) => {
                btn.addEventListener('click', () => {
                    const skin = pageSkins[index];
                    open3DViewer(skin);
                });
            });
            
            document.querySelectorAll('.download').forEach((btn, index) => {
                btn.addEventListener('click', () => {
                    const skin = pageSkins[index];
                    window.open(SKINS_BASE_URL + skin.file, '_blank');
                });
            });
            
            document.querySelectorAll('.delete').forEach((btn, index) => {
                btn.addEventListener('click', () => {
                    const skin = pageSkins[index];
                    if (confirm(`Удалить скин "${skin.name}"?`)) {
                        showMessage('Удаление доступно только в панели модерации', 'error');
                    }
                });
            });
            
            renderPagination();
        }
        
        // Отрендерить пагинацию
        function renderPagination() {
            const totalPages = Math.ceil(allSkins.length / SKINS_PER_PAGE);
            const pagination = document.getElementById('pagination');
            
            if (totalPages <= 1) {
                pagination.innerHTML = '';
                return;
            }
            
            let html = '';
            
            // Кнопка "Назад"
            html += `<button class="page-btn" ${currentPage === 1 ? 'disabled' : ''} data-page="${currentPage - 1}">
                <i class="fas fa-chevron-left"></i>
            </button>`;
            
            // Номера страниц
            for (let i = 1; i <= totalPages; i++) {
                if (i === 1 || i === totalPages || (i >= currentPage - 2 && i <= currentPage + 2)) {
                    html += `<button class="page-btn ${i === currentPage ? 'active' : ''}" data-page="${i}">${i}</button>`;
                } else if (i === currentPage - 3 || i === currentPage + 3) {
                    html += `<button class="page-btn" disabled>...</button>`;
                }
            }
            
            // Кнопка "Вперед"
            html += `<button class="page-btn" ${currentPage === totalPages ? 'disabled' : ''} data-page="${currentPage + 1}">
                <i class="fas fa-chevron-right"></i>
            </button>`;
            
            pagination.innerHTML = html;
            
            // Добавляем обработчики
            pagination.querySelectorAll('button[data-page]').forEach(btn => {
                btn.addEventListener('click', () => {
                    const page = parseInt(btn.dataset.page);
                    if (!isNaN(page) && page !== currentPage) {
                        currentPage = page;
                        renderGallery();
                        window.scrollTo({ top: 0, behavior: 'smooth' });
                    }
                });
            });
        }
        
        // ========== 3D ПРОСМОТРЩИК ==========
        
        let currentViewer = null;
        
        function open3DViewer(skin) {
            const modal = document.getElementById('skinModal');
            const viewer = document.getElementById('modalViewer');
            
            modal.classList.add('active');
            
            // Очищаем предыдущий просмотрщик
            viewer.innerHTML = '';
            
            // Создаем новый
            currentViewer = create3DViewer(viewer, SKINS_BASE_URL + skin.file);
        }
        
        function create3DViewer(container, textureUrl) {
            const width = container.clientWidth;
            const height = 500;
            
            // Сцена
            const scene = new THREE.Scene();
            scene.background = new THREE.Color(0x0a0c0f);
            
            // Камера
            const camera = new THREE.PerspectiveCamera(45, width / height, 0.1, 1000);
            camera.position.set(3, 2, 5);
            camera.lookAt(0, 1, 0);
            
            // Рендерер
            const renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(width, height);
            renderer.shadowMap.enabled = true;
            renderer.setPixelRatio(window.devicePixelRatio);
            container.appendChild(renderer.domElement);
            
            // Контролы
            const controls = new OrbitControls(camera, renderer.domElement);
            controls.enableDamping = true;
            controls.dampingFactor = 0.05;
            controls.autoRotate = true;
            controls.autoRotateSpeed = 1.5;
            controls.enableZoom = true;
            controls.maxPolarAngle = Math.PI / 2;
            controls.target.set(0, 1, 0);
            
            // Освещение
            const ambientLight = new THREE.AmbientLight(0x404060);
            scene.add(ambientLight);
            
            const dirLight = new THREE.DirectionalLight(0xffffff, 1);
            dirLight.position.set(5, 10, 7);
            dirLight.castShadow = true;
            dirLight.receiveShadow = true;
            scene.add(dirLight);
            
            const fillLight = new THREE.PointLight(0x4466aa, 0.5);
            fillLight.position.set(-2, 1, 3);
            scene.add(fillLight);
            
            // Пол
            const planeGeometry = new THREE.CircleGeometry(5, 32);
            const planeMaterial = new THREE.MeshStandardMaterial({ color: 0x1a1f2a, roughness: 0.8 });
            const plane = new THREE.Mesh(planeGeometry, planeMaterial);
            plane.rotation.x = -Math.PI / 2;
            plane.position.y = -0.01;
            plane.receiveShadow = true;
            scene.add(plane);
            
            // Сетка
            const gridHelper = new THREE.GridHelper(10, 20, 0x4a9eff, 0x2a3f6e);
            gridHelper.position.y = 0;
            scene.add(gridHelper);
            
            // Загружаем текстуру
            const loader = new THREE.TextureLoader();
            loader.load(textureUrl + '?t=' + Date.now(), 
                (texture) => {
                    texture.magFilter = THREE.NearestFilter;
                    texture.minFilter = THREE.NearestFilter;
                    
                    const material = new THREE.MeshStandardMaterial({ map: texture });
                    
                    // Создаем модель (упрощенная)
                    const group = new THREE.Group();
                    
                    function addBox(w, h, d, posX, posY, posZ) {
                        const geometry = new THREE.BoxGeometry(w, h, d);
                        const mesh = new THREE.Mesh(geometry, material);
                        mesh.position.set(posX, posY, posZ);
                        mesh.castShadow = true;
                        mesh.receiveShadow = true;
                        group.add(mesh);
                    }
                    
                    // Голова
                    addBox(0.8, 0.8, 0.8, 0, 1.8, 0);
                    // Тело
                    addBox(0.8, 1.2, 0.4, 0, 0.8, 0);
                    // Руки
                    addBox(0.4, 1.2, 0.4, -0.6, 0.8, 0);
                    addBox(0.4, 1.2, 0.4, 0.6, 0.8, 0);
                    // Ноги
                    addBox(0.4, 1.2, 0.4, -0.2, -0.2, 0);
                    addBox(0.4, 1.2, 0.4, 0.2, -0.2, 0);
                    
                    group.scale.set(1, 1, 1);
                    group.position.y = 1.5;
                    
                    scene.add(group);
                    
                    // Анимация
                    function animate() {
                        requestAnimationFrame(animate);
                        controls.update();
                        renderer.render(scene, camera);
                    }
                    animate();
                }
            );
            
            // Обработка ресайза
            function onResize() {
                const newWidth = container.clientWidth;
                camera.aspect = newWidth / height;
                camera.updateProjectionMatrix();
                renderer.setSize(newWidth, height);
            }
            
            window.addEventListener('resize', onResize);
            
            return () => {
                window.removeEventListener('resize', onResize);
                renderer.dispose();
            };
        }
        
        // ========== ЗАГРУЗКА СКИНОВ ==========
        
        document.getElementById('skinUpload').addEventListener('change', async (e) => {
            const file = e.target.files[0];
            if (!file) return;
            
            // Проверка размера
            if (file.size > MAX_FILE_SIZE) {
                showMessage('Файл слишком большой (макс. 5 МБ)', 'error');
                return;
            }
            
            // Проверка типа
            if (!file.type.startsWith('image/')) {
                showMessage('Можно загружать только изображения', 'error');
                return;
            }
            
            showMessage('Загрузка скинов доступна в панели модерации', 'info');
            
            // Сбрасываем input
            e.target.value = '';
        });
        
        // ========== МОДАЛЬНОЕ ОКНО ==========
        
        document.getElementById('closeModal').addEventListener('click', () => {
            document.getElementById('skinModal').classList.remove('active');
            if (currentViewer) {
                currentViewer();
                currentViewer = null;
            }
        });
        
        // Закрытие по клику на фон
        document.getElementById('skinModal').addEventListener('click', (e) => {
            if (e.target === document.getElementById('skinModal')) {
                document.getElementById('closeModal').click();
            }
        });
        
        // ========== ЗАПУСК ==========
        loadSkins();
        
        // Обновление каждые 30 секунд
        setInterval(loadSkins, 30000);
    </script>
</body>
</html>
