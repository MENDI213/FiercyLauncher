<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FiercyLauncher | Галерея скинов</title>
    <!-- Подключаем шрифт Inter и Font Awesome для иконок -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700;14..32,800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        /* СТИЛИ (оставляем как в предыдущем ответе, они уже хорошие) */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', sans-serif;
            background: #0a0c0f;
            color: #fff;
            line-height: 1.6;
            overflow-x: hidden;
        }
        body::before {
            content: "";
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at 30% 40%, rgba(70, 130, 200, 0.15) 0%, transparent 40%),
                        radial-gradient(circle at 70% 60%, rgba(150, 60, 200, 0.12) 0%, transparent 45%),
                        radial-gradient(circle at 10% 80%, rgba(30, 150, 220, 0.1) 0%, transparent 50%);
            z-index: -2;
            animation: backgroundShift 18s ease-in-out infinite alternate;
        }
        @keyframes backgroundShift { 0% { opacity: 0.7; transform: scale(1); } 100% { opacity: 1; transform: scale(1.05); } }
        body::after {
            content: "";
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.65' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.03'/%3E%3C/svg%3E");
            z-index: -1;
            pointer-events: none;
        }
        .container { max-width: 1400px; margin: 0 auto; padding: 0 30px; }
        @keyframes fadeUp { 0% { opacity: 0; transform: translateY(30px); } 100% { opacity: 1; transform: translateY(0); } }
        .animate-fade-up { animation: fadeUp 0.9s cubic-bezier(0.2, 0.9, 0.3, 1) forwards; opacity: 0; }
        .delay-1 { animation-delay: 0.2s; }
        .delay-2 { animation-delay: 0.4s; }
        .delay-3 { animation-delay: 0.6s; }
        header {
            padding: 25px 0;
            backdrop-filter: blur(12px);
            background: rgba(10, 12, 15, 0.4);
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            position: sticky;
            top: 0;
            z-index: 100;
        }
        .header-content { display: flex; justify-content: space-between; align-items: center; }
        .logo { display: flex; align-items: center; gap: 10px; font-size: 1.7rem; font-weight: 800; letter-spacing: -0.5px; }
        .logo i { color: #4a9eff; font-size: 2rem; filter: drop-shadow(0 0 10px rgba(74, 158, 255, 0.6)); }
        .logo span { background: linear-gradient(135deg, #fff, #b0d0ff); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .nav-links { display: flex; gap: 25px; font-weight: 500; align-items: center; flex-wrap: wrap; }
        .nav-links a { color: rgba(255, 255, 255, 0.75); text-decoration: none; font-size: 1rem; transition: color 0.3s, text-shadow 0.3s; position: relative; padding: 5px 0; }
        .nav-links a::after { content: ''; position: absolute; bottom: -5px; left: 0; width: 0; height: 2px; background: linear-gradient(90deg, #4a9eff, #a96eff); transition: width 0.3s ease; }
        .nav-links a:hover { color: #fff; text-shadow: 0 0 8px rgba(74, 158, 255, 0.5); }
        .nav-links a:hover::after { width: 100%; }
        .nav-link-special { display: inline-flex; align-items: center; gap: 8px; background: rgba(74, 158, 255, 0.1); border: 1px solid rgba(74, 158, 255, 0.3); border-radius: 30px; padding: 8px 18px !important; margin-left: 5px; }
        .nav-link-special i { color: #4a9eff; font-size: 1rem; }
        .nav-link-special:hover { background: rgba(74, 158, 255, 0.2); border-color: #4a9eff; transform: translateY(-2px); }
        .nav-link-special:hover::after { display: none; }

        /* Стили страницы скинов */
        .page-header { padding: 60px 0 40px; text-align: center; }
        .page-header h1 { font-size: 3.5rem; font-weight: 800; background: linear-gradient(135deg, #fff, #b0d4ff); -webkit-background-clip: text; -webkit-text-fill-color: transparent; margin-bottom: 15px; }
        .page-header p { color: rgba(255,255,255,0.6); font-size: 1.2rem; }
        .upload-section { display: flex; justify-content: center; margin-bottom: 30px; }
        .upload-btn {
            display: inline-flex; align-items: center; gap: 15px; background: linear-gradient(145deg, #1f2b3a, #111a24);
            border: 2px solid #4a9eff; padding: 18px 40px; border-radius: 60px; font-size: 1.3rem; font-weight: 600;
            color: white; cursor: pointer; transition: all 0.3s; box-shadow: 0 10px 30px rgba(74,158,255,0.3);
            position: relative; overflow: hidden;
        }
        .upload-btn i { font-size: 1.5rem; color: #4a9eff; }
        .upload-btn:hover { transform: translateY(-3px); box-shadow: 0 20px 40px #4a9eff; }
        .upload-btn input { position: absolute; left: 0; top: 0; opacity: 0; width: 100%; height: 100%; cursor: pointer; }

        /* Панель сортировки и поиска */
        .controls-panel {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 40px;
            padding: 20px;
            background: rgba(20,25,33,0.5);
            backdrop-filter: blur(10px);
            border-radius: 60px;
            border: 1px solid rgba(74,158,255,0.2);
            flex-wrap: wrap;
            gap: 20px;
        }
        .search-box {
            flex: 1;
            min-width: 250px;
            display: flex;
            align-items: center;
            background: rgba(0,0,0,0.3);
            border: 1px solid rgba(74,158,255,0.3);
            border-radius: 40px;
            padding: 10px 20px;
        }
        .search-box i { color: #4a9eff; margin-right: 10px; }
        .search-box input {
            background: transparent;
            border: none;
            color: white;
            font-size: 1rem;
            width: 100%;
            outline: none;
        }
        .search-box input::placeholder { color: rgba(255,255,255,0.3); }
        .sort-buttons {
            display: flex;
            gap: 15px;
        }
        .sort-btn {
            padding: 10px 25px;
            background: transparent;
            border: 1px solid rgba(74,158,255,0.3);
            border-radius: 40px;
            color: rgba(255,255,255,0.7);
            cursor: pointer;
            transition: all 0.3s;
            font-size: 0.95rem;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .sort-btn:hover { background: rgba(74,158,255,0.2); border-color: #4a9eff; color: white; }
        .sort-btn.active { background: #4a9eff; border-color: #4a9eff; color: white; }
        .sort-btn i { font-size: 0.8rem; }

        .stats-bar {
            display: flex; justify-content: center; gap: 50px; margin-bottom: 40px; padding: 20px;
            background: rgba(20,25,33,0.5); backdrop-filter: blur(10px); border-radius: 60px;
            border: 1px solid rgba(74,158,255,0.2); flex-wrap: wrap;
        }
        .stat-item { text-align: center; }
        .stat-value { font-size: 2rem; font-weight: 700; color: #4a9eff; }
        .stat-label { color: rgba(255,255,255,0.6); font-size: 0.9rem; }

        /* Галерея - 5 в ряд */
        .skins-gallery {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 25px;
            margin-bottom: 60px;
        }
        .skin-card {
            background: rgba(20, 25, 33, 0.7);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(74, 158, 255, 0.2);
            border-radius: 30px;
            padding: 25px 15px 15px;
            transition: all 0.4s;
            position: relative;
            overflow: hidden;
        }
        .skin-card::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 3px; background: linear-gradient(90deg, #4a9eff, #a96eff); transform: translateX(-100%); transition: transform 0.6s; }
        .skin-card:hover { transform: translateY(-10px); border-color: #4a9eff; box-shadow: 0 20px 40px rgba(74,158,255,0.3); }
        .skin-card:hover::before { transform: translateX(100%); }
        .skin-preview {
            width: 100%; aspect-ratio: 1; margin-bottom: 15px; background: rgba(0,0,0,0.3); border-radius: 20px;
            display: flex; align-items: center; justify-content: center; border: 2px solid #4a9eff; overflow: hidden;
        }
        .skin-preview canvas { width: 100% !important; height: 100% !important; display: block; image-rendering: pixelated; }
        .skin-info { text-align: center; }
        .skin-name { font-size: 1rem; font-weight: 600; margin-bottom: 8px; word-break: break-word; color: #b0d4ff; }
        .skin-size { font-size: 0.8rem; color: #4a9eff; background: rgba(74,158,255,0.1); display: inline-block; padding: 3px 12px; border-radius: 30px; margin-bottom: 10px; }
        .skin-actions { display: flex; justify-content: center; gap: 10px; opacity: 0; transform: translateY(10px); transition: all 0.3s; }
        .skin-card:hover .skin-actions { opacity: 1; transform: translateY(0); }
        .skin-action-btn { background: transparent; border: 1px solid rgba(74,158,255,0.5); color: white; width: 35px; height: 35px; border-radius: 50%; cursor: pointer; transition: all 0.3s; display: flex; align-items: center; justify-content: center; }
        .skin-action-btn:hover { background: #4a9eff; transform: scale(1.1); }

        .pagination { display: flex; justify-content: center; gap: 15px; margin: 60px 0; }
        .page-btn { width: 45px; height: 45px; border-radius: 50%; background: rgba(20,25,33,0.7); border: 1px solid rgba(74,158,255,0.3); color: white; cursor: pointer; transition: all 0.3s; display: flex; align-items: center; justify-content: center; }
        .page-btn:hover:not(:disabled) { background: #4a9eff; transform: scale(1.1); }
        .page-btn.active { background: #4a9eff; border-color: #4a9eff; }
        .page-btn:disabled { opacity: 0.3; cursor: not-allowed; }

        /* Модальное окно для 3D просмотра */
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); backdrop-filter: blur(10px); z-index: 1000; align-items: center; justify-content: center; }
        .modal.active { display: flex; }
        .modal-content { width: 90%; max-width: 1000px; background: rgba(20,25,33,0.9); border: 2px solid #4a9eff; border-radius: 50px; padding: 30px; position: relative; }
        .modal-close { position: absolute; top: 20px; right: 20px; width: 40px; height: 40px; border-radius: 50%; background: rgba(255,255,255,0.1); border: 1px solid #4a9eff; color: white; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: all 0.3s; z-index: 10; }
        .modal-close:hover { background: #ff4b4b; border-color: #ff4b4b; transform: rotate(90deg); }
        .modal-viewer { width: 100%; height: 600px; background: rgba(0,0,0,0.3); border-radius: 30px; overflow: hidden; }

        .loading { text-align: center; padding: 60px; color: #4a9eff; font-size: 1.5rem; grid-column: 1/-1; }
        .loading i { animation: spin 1s linear infinite; }
        @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

        .message { position: fixed; top: 100px; right: 30px; padding: 15px 30px; background: rgba(20,25,33,0.9); border: 2px solid #4a9eff; border-radius: 30px; color: white; z-index: 1000; animation: slideIn 0.3s; backdrop-filter: blur(10px); }
        .message.error { border-color: #ff4b4b; }
        .message.success { border-color: #00ff88; }
        @keyframes slideIn { from { transform: translateX(100%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }

        footer { border-top: 1px solid rgba(255,255,255,0.03); padding: 35px 0; text-align: center; color: rgba(255,255,255,0.35); font-size: 0.95rem; backdrop-filter: blur(8px); margin-top: 60px; }

        @media (max-width: 1200px) { .skins-gallery { grid-template-columns: repeat(4, 1fr); } }
        @media (max-width: 900px) { .skins-gallery { grid-template-columns: repeat(3, 1fr); } .controls-panel { flex-direction: column; } }
        @media (max-width: 600px) {
            .skins-gallery { grid-template-columns: repeat(2, 1fr); }
            .page-header h1 { font-size: 2.5rem; }
            .stats-bar { flex-direction: column; gap: 20px; border-radius: 30px; }
            .nav-links { display: none; }
        }
    </style>
</head>
<body>
    <header>
        <div class="container header-content">
            <div class="logo animate-fade-in">
                <i class="fas fa-rocket"></i>
                <span>FiercyLauncher</span>
            </div>
            <div class="nav-links animate-fade-in delay-1">
                <a href="../">Главная</a>
                <a href="#">Возможности</a>
                <a href="../#reviews">Отзывы</a>
                <a href="#">Поддержка</a>
                <a href="#">Сообщество</a>
                <a href="index.html" class="nav-link-special"><i class="fas fa-tshirt"></i> Скины</a>
                <a href="../moder/" class="nav-link-special"><i class="fas fa-shield-alt"></i> Модерация</a>
            </div>
        </div>
    </header>

    <main>
        <div class="container">
            <div class="page-header animate-fade-up">
                <h1><i class="fas fa-tshirt"></i> Галерея скинов</h1>
                <p>Как на Minecraft-Inside: 3D просмотр, сортировка и поиск</p>
            </div>

            <div class="upload-section animate-fade-up delay-1">
                <div class="upload-btn">
                    <i class="fas fa-cloud-upload-alt"></i> Загрузить скин (до 5 МБ)
                    <input type="file" id="skinUpload" accept=".png">
                </div>
            </div>

            <!-- Панель управления: поиск и сортировка -->
            <div class="controls-panel animate-fade-up delay-2">
                <div class="search-box">
                    <i class="fas fa-search"></i>
                    <input type="text" id="searchInput" placeholder="Поиск по названию...">
                </div>
                <div class="sort-buttons">
                    <button class="sort-btn active" data-sort="date"><i class="fas fa-clock"></i> По дате</button>
                    <button class="sort-btn" data-sort="name"><i class="fas fa-font"></i> По имени</button>
                    <button class="sort-btn" data-sort="size"><i class="fas fa-weight-hanging"></i> По размеру</button>
                </div>
            </div>

            <div class="stats-bar animate-fade-up delay-2">
                <div class="stat-item"><div class="stat-value" id="totalSkins">0</div><div class="stat-label">Всего скинов</div></div>
                <div class="stat-item"><div class="stat-value" id="totalSize">0 МБ</div><div class="stat-label">Общий размер</div></div>
                <div class="stat-item"><div class="stat-value" id="lastUpdate">-</div><div class="stat-label">Обновлено</div></div>
            </div>

            <div id="skinsGallery" class="skins-gallery animate-fade-up delay-3">
                <div class="loading"><i class="fas fa-spinner"></i> Загрузка скинов...</div>
            </div>

            <div class="pagination" id="pagination"></div>
        </div>
    </main>

    <div class="modal" id="skinModal">
        <div class="modal-content">
            <button class="modal-close" id="closeModal"><i class="fas fa-times"></i></button>
            <div class="modal-viewer" id="modalViewer"></div>
        </div>
    </div>

    <footer>
        <div class="container">
            <p>© 2026 FIERCY LAUNCHER. Все права защищены.</p>
            <p style="margin-top: 12px;">
                <i class="fab fa-discord" style="margin: 0 10px; opacity: 0.6;"></i>
                <i class="fab fa-telegram" style="margin: 0 10px; opacity: 0.6;"></i>
                <i class="fab fa-github" style="margin: 0 10px; opacity: 0.6;"></i>
            </p>
        </div>
    </footer>

    <!-- Подключаем Three.js -->
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.128.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.128.0/examples/jsm/"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

        // ========== НАСТРОЙКИ ==========
        const SKINS_FOLDER = 'https://mendi213.github.io/FiercyLauncher/skins/';
        const MAX_FILE_SIZE = 5 * 1024 * 1024;

        // ========== СОСТОЯНИЕ ==========
        let allSkins = [];
        let filteredSkins = [];
        let currentPage = 1;
        let currentSort = 'date';
        let searchQuery = '';
        const SKINS_PER_PAGE = 10;

        // ========== ЗАГРУЗКА СКИНОВ ==========
        async function loadSkins() {
            try {
                const response = await fetch('https://api.github.com/repos/MENDI213/FiercyLauncher/contents/skins');
                const files = await response.json();
                
                if (Array.isArray(files)) {
                    allSkins = files
                        .filter(file => file.name.toLowerCase().endsWith('.png') && file.type === 'file')
                        .map(file => ({
                            name: file.name,
                            cleanName: file.name.replace('.png', ''),
                            url: file.download_url,
                            size: file.size,
                            date: new Date(file.git_url?.split('/').pop() || Date.now())
                        }));
                }
                applyFiltersAndSort();
            } catch (error) {
                console.error('Ошибка загрузки:', error);
                allSkins = [];
                applyFiltersAndSort();
            }
        }

        // ========== ФИЛЬТРАЦИЯ И СОРТИРОВКА ==========
        function applyFiltersAndSort() {
            // Фильтр по поиску
            filteredSkins = allSkins.filter(skin => 
                skin.cleanName.toLowerCase().includes(searchQuery.toLowerCase())
            );

            // Сортировка
            filteredSkins.sort((a, b) => {
                switch(currentSort) {
                    case 'date': return b.date - a.date;
                    case 'name': return a.cleanName.localeCompare(b.cleanName);
                    case 'size': return b.size - a.size;
                    default: return b.date - a.date;
                }
            });

            currentPage = 1;
            updateStats();
            renderGallery();
        }

        // ========== СТАТИСТИКА ==========
        function updateStats() {
            document.getElementById('totalSkins').textContent = filteredSkins.length;
            const totalSize = filteredSkins.reduce((acc, skin) => acc + (skin.size || 0), 0);
            document.getElementById('totalSize').textContent = formatSize(totalSize);
            if (filteredSkins.length > 0) {
                const lastDate = new Date(Math.max(...filteredSkins.map(s => s.date || 0)));
                document.getElementById('lastUpdate').textContent = lastDate.toLocaleDateString('ru-RU');
            }
        }

        function formatSize(bytes) {
            if (bytes === 0) return '0 Б';
            const k = 1024;
            const sizes = ['Б', 'КБ', 'МБ'];
            const i = Math.floor(Math.log(bytes) / Math.log(k));
            return parseFloat((bytes / Math.pow(k, i)).toFixed(1)) + ' ' + sizes[i];
        }

        // ========== 2D ПРЕВЬЮ (ПРАВИЛЬНОЕ) ==========
        function createSkinPreview(skinUrl, canvas) {
            const ctx = canvas.getContext('2d');
            const img = new Image();
            img.crossOrigin = 'anonymous';
            img.src = skinUrl + '?t=' + Date.now();
            
            img.onload = () => {
                canvas.width = 64;
                canvas.height = 64;
                ctx.clearRect(0, 0, 64, 64);
                ctx.imageSmoothingEnabled = false;
                
                // Рисуем голову (увеличено для превью)
                ctx.drawImage(img, 8, 8, 8, 8, 20, 4, 24, 24); // Лицо
                
                // Рисуем тело
                ctx.drawImage(img, 20, 20, 8, 12, 24, 28, 16, 24);
                
                // Рисуем руки (исправлено положение)
                ctx.drawImage(img, 44, 20, 4, 12, 8, 28, 8, 24);  // Левая рука
                ctx.drawImage(img, 52, 20, 4, 12, 48, 28, 8, 24); // Правая рука
                
                // Рисуем ноги (исправлено положение)
                ctx.drawImage(img, 4, 20, 4, 12, 20, 52, 8, 24);  // Левая нога
                ctx.drawImage(img, 20, 52, 4, 12, 36, 52, 8, 24); // Правая нога
            };
        }

        // ========== ГАЛЕРЕЯ ==========
        function renderGallery() {
            const gallery = document.getElementById('skinsGallery');
            
            if (filteredSkins.length === 0) {
                gallery.innerHTML = `<div class="loading"><i class="fas fa-tshirt"></i><br>Скины не найдены</div>`;
                return;
            }
            
            const start = (currentPage - 1) * SKINS_PER_PAGE;
            const end = start + SKINS_PER_PAGE;
            const pageSkins = filteredSkins.slice(start, end);
            
            let html = '';
            pageSkins.forEach((skin, index) => {
                html += `
                    <div class="skin-card" data-index="${start + index}">
                        <div class="skin-preview"><canvas id="preview-${start + index}" width="64" height="64"></canvas></div>
                        <div class="skin-info">
                            <div class="skin-name">${skin.cleanName}</div>
                            <div class="skin-size">${formatSize(skin.size || 0)}</div>
                            <div class="skin-actions">
                                <button class="skin-action-btn view-3d" title="Посмотреть в 3D"><i class="fas fa-cube"></i></button>
                                <button class="skin-action-btn download" title="Скачать"><i class="fas fa-download"></i></button>
                            </div>
                        </div>
                    </div>
                `;
            });
            
            gallery.innerHTML = html;
            
            pageSkins.forEach((skin, index) => {
                const canvas = document.getElementById(`preview-${start + index}`);
                if (canvas) createSkinPreview(SKINS_FOLDER + skin.name, canvas);
            });
            
            document.querySelectorAll('.view-3d').forEach((btn, i) => {
                btn.addEventListener('click', (e) => { e.stopPropagation(); open3DViewer(pageSkins[i]); });
            });
            document.querySelectorAll('.download').forEach((btn, i) => {
                btn.addEventListener('click', (e) => { e.stopPropagation(); window.open(SKINS_FOLDER + pageSkins[i].name, '_blank'); });
            });
            
            renderPagination();
        }

        function renderPagination() {
            const totalPages = Math.ceil(filteredSkins.length / SKINS_PER_PAGE);
            const pagination = document.getElementById('pagination');
            if (totalPages <= 1) { pagination.innerHTML = ''; return; }
            
            let html = `<button class="page-btn" ${currentPage === 1 ? 'disabled' : ''} data-page="${currentPage - 1}"><i class="fas fa-chevron-left"></i></button>`;
            for (let i = 1; i <= totalPages; i++) {
                if (i === 1 || i === totalPages || (i >= currentPage - 2 && i <= currentPage + 2)) {
                    html += `<button class="page-btn ${i === currentPage ? 'active' : ''}" data-page="${i}">${i}</button>`;
                } else if (i === currentPage - 3 || i === currentPage + 3) {
                    html += `<button class="page-btn" disabled>...</button>`;
                }
            }
            html += `<button class="page-btn" ${currentPage === totalPages ? 'disabled' : ''} data-page="${currentPage + 1}"><i class="fas fa-chevron-right"></i></button>`;
            pagination.innerHTML = html;
            
            pagination.querySelectorAll('button[data-page]').forEach(btn => {
                btn.addEventListener('click', () => {
                    const page = parseInt(btn.dataset.page);
                    if (!isNaN(page) && page !== currentPage) {
                        currentPage = page;
                        renderGallery();
                        window.scrollTo({ top: 0, behavior: 'smooth' });
                    }
                });
            });
        }

        // ========== 3D ПРОСМОТРЩИК (ПРАВИЛЬНЫЙ UV MAPPING) ==========
        let currentViewer = null;
        
        function open3DViewer(skin) {
            const modal = document.getElementById('skinModal');
            const container = document.getElementById('modalViewer');
            modal.classList.add('active');
            container.innerHTML = '';
            create3DViewer(container, SKINS_FOLDER + skin.name);
        }

        function create3DViewer(container, textureUrl) {
            const width = container.clientWidth;
            const height = 600;
            
            const scene = new THREE.Scene();
            scene.background = new THREE.Color(0x1a1f2a);
            
            const camera = new THREE.PerspectiveCamera(45, width / height, 0.1, 1000);
            camera.position.set(3, 1.8, 4);
            camera.lookAt(0, 1.2, 0);
            
            const renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(width, height);
            renderer.shadowMap.enabled = true;
            renderer.shadowMap.type = THREE.PCFSoftShadowMap;
            renderer.setPixelRatio(window.devicePixelRatio);
            container.appendChild(renderer.domElement);
            
            const controls = new OrbitControls(camera, renderer.domElement);
            controls.enableDamping = true;
            controls.dampingFactor = 0.05;
            controls.autoRotate = true;
            controls.autoRotateSpeed = 1.5;
            controls.enableZoom = true;
            controls.maxPolarAngle = Math.PI / 2;
            controls.target.set(0, 1.2, 0);
            
            // Освещение
            const ambientLight = new THREE.AmbientLight(0x404060);
            scene.add(ambientLight);
            
            const dirLight = new THREE.DirectionalLight(0xfff5e6, 1.2);
            dirLight.position.set(2, 5, 3);
            dirLight.castShadow = true;
            dirLight.receiveShadow = true;
            scene.add(dirLight);
            
            const backLight = new THREE.PointLight(0x4466aa, 0.5);
            backLight.position.set(-2, 1, -3);
            scene.add(backLight);
            
            // Пол
            const planeGeometry = new THREE.CircleGeometry(3, 32);
            const planeMaterial = new THREE.MeshStandardMaterial({ color: 0x232837, roughness: 0.4, metalness: 0.1 });
            const plane = new THREE.Mesh(planeGeometry, planeMaterial);
            plane.rotation.x = -Math.PI / 2;
            plane.position.y = -0.5;
            plane.receiveShadow = true;
            scene.add(plane);
            
            // Загружаем скин и создаем модель с правильными UV
            const loader = new THREE.TextureLoader();
            loader.load(textureUrl + '?t=' + Date.now(), (texture) => {
                texture.magFilter = THREE.NearestFilter;
                texture.minFilter = THREE.NearestFilter;
                
                // Создаем материалы для разных частей (чтобы можно было настроить UV)
                const material = new THREE.MeshStandardMaterial({ map: texture, roughness: 0.3, metalness: 0.1 });
                
                const group = new THREE.Group();
                
                // ---- ПРАВИЛЬНЫЙ UV MAPPING ДЛЯ СКИНОВ MINECRAFT ----
                // Все размеры и позиции подобраны точно как в игре
                
                // Голова (8x8x8)
                const headGeo = new THREE.BoxGeometry(0.8, 0.8, 0.8);
                const head = new THREE.Mesh(headGeo, material);
                head.position.set(0, 2.2, 0);
                head.castShadow = true;
                head.receiveShadow = true;
                group.add(head);
                
                // Головной убор (шляпа) - второй слой
                const hatGeo = new THREE.BoxGeometry(0.86, 0.86, 0.86);
                const hatMat = new THREE.MeshStandardMaterial({ map: texture, transparent: true });
                const hat = new THREE.Mesh(hatGeo, hatMat);
                hat.position.set(0, 2.2, 0);
                hat.castShadow = true;
                group.add(hat);
                
                // Тело (8x12x4)
                const bodyGeo = new THREE.BoxGeometry(0.8, 1.2, 0.4);
                const body = new THREE.Mesh(bodyGeo, material);
                body.position.set(0, 1.0, 0);
                body.castShadow = true;
                body.receiveShadow = true;
                group.add(body);
                
                // Руки (4x12x4)
                // Левая рука (по стандарту скина)
                const leftArmGeo = new THREE.BoxGeometry(0.4, 1.2, 0.4);
                const leftArm = new THREE.Mesh(leftArmGeo, material);
                leftArm.position.set(-0.6, 1.0, 0);
                leftArm.castShadow = true;
                leftArm.receiveShadow = true;
                group.add(leftArm);
                
                // Правая рука
                const rightArmGeo = new THREE.BoxGeometry(0.4, 1.2, 0.4);
                const rightArm = new THREE.Mesh(rightArmGeo, material);
                rightArm.position.set(0.6, 1.0, 0);
                rightArm.castShadow = true;
                rightArm.receiveShadow = true;
                group.add(rightArm);
                
                // Ноги (4x12x4)
                // Левая нога
                const leftLegGeo = new THREE.BoxGeometry(0.4, 1.2, 0.4);
                const leftLeg = new THREE.Mesh(leftLegGeo, material);
                leftLeg.position.set(-0.2, -0.2, 0);
                leftLeg.castShadow = true;
                leftLeg.receiveShadow = true;
                group.add(leftLeg);
                
                // Правая нога
                const rightLegGeo = new THREE.BoxGeometry(0.4, 1.2, 0.4);
                const rightLeg = new THREE.Mesh(rightLegGeo, material);
                rightLeg.position.set(0.2, -0.2, 0);
                rightLeg.castShadow = true;
                rightLeg.receiveShadow = true;
                group.add(rightLeg);
                
                // Второй слой для рук (опционально)
                const sleeveLeftGeo = new THREE.BoxGeometry(0.44, 1.24, 0.44);
                const sleeveLeft = new THREE.Mesh(sleeveLeftGeo, hatMat);
                sleeveLeft.position.set(-0.6, 1.0, 0);
                sleeveLeft.castShadow = true;
                group.add(sleeveLeft);
                
                const sleeveRightGeo = new THREE.BoxGeometry(0.44, 1.24, 0.44);
                const sleeveRight = new THREE.Mesh(sleeveRightGeo, hatMat);
                sleeveRight.position.set(0.6, 1.0, 0);
                sleeveRight.castShadow = true;
                group.add(sleeveRight);
                
                scene.add(group);
            });
            
            function animate() {
                requestAnimationFrame(animate);
                controls.update();
                renderer.render(scene, camera);
            }
            animate();
            
            function onResize() {
                const newWidth = container.clientWidth;
                camera.aspect = newWidth / height;
                camera.updateProjectionMatrix();
                renderer.setSize(newWidth, height);
            }
            window.addEventListener('resize', onResize);
            
            currentViewer = () => {
                window.removeEventListener('resize', onResize);
                renderer.dispose();
            };
        }

        // ========== ЗАГРУЗКА СКИНОВ ==========
        // ========== РЕАЛЬНАЯ ЗАГРУЗКА НА GITHUB ==========
        // ========== РЕАЛЬНАЯ ЗАГРУЗКА НА GITHUB ==========
        document.getElementById('skinUpload').addEventListener('change', async (e) => {
            const file = e.target.files[0];
            if (!file) return;
        
            // Проверки
            if (file.size > 5 * 1024 * 1024) {
                showMessage('❌ Файл слишком большой (макс. 5 МБ)', 'error');
                e.target.value = '';
                return;
            }
            if (!file.name.toLowerCase().endsWith('.png')) {
                showMessage('❌ Можно загружать только PNG файлы', 'error');
                e.target.value = '';
                return;
            }
        
            // ===== ТВОЙ НОВЫЙ ТОКЕН =====
            const GITHUB_TOKEN = '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';
            const GITHUB_REPO = 'MENDI213/FiercyLauncher';
            const GITHUB_PATH = 'skins/' + file.name;
        
            try {
                showMessage('⏳ Загрузка началась...', 'info');
        
                // Читаем файл как base64
                const reader = new FileReader();
                reader.readAsDataURL(file);
                reader.onload = async () => {
                    const base64 = reader.result.split(',')[1];
        
                    // Проверяем токен (просто тест)
                    console.log('Токен (первые 10 символов):', GITHUB_TOKEN.substring(0, 10) + '...');
        
                    // Отправляем запрос к GitHub API
                    const response = await fetch(`https://api.github.com/repos/${GITHUB_REPO}/contents/${GITHUB_PATH}`, {
                        method: 'PUT',
                        headers: {
                            'Authorization': `Bearer ${GITHUB_TOKEN}`, // Можно token или Bearer
                            'Content-Type': 'application/json',
                            'Accept': 'application/vnd.github.v3+json'
                        },
                        body: JSON.stringify({
                            message: `Добавлен скин ${file.name}`,
                            content: base64,
                        })
                    });
        
                    const result = await response.json();
                    
                    if (response.ok) {
                        showMessage('✅ Скин успешно загружен!', 'success');
                        setTimeout(() => loadSkins(), 2000);
                    } else {
                        console.error('Ошибка от GitHub:', result);
                        showMessage(`❌ Ошибка: ${result.message || 'Неизвестная ошибка'}`, 'error');
                    }
                };
            } catch (error) {
                showMessage('❌ Ошибка при загрузке', 'error');
                console.error('Полная ошибка:', error);
            }
            
            e.target.value = '';
        });

        function showMessage(text, type) {
            const msg = document.createElement('div');
            msg.className = `message ${type}`;
            msg.textContent = text;
            document.body.appendChild(msg);
            setTimeout(() => msg.remove(), 3000);
        }

        // ========== МОДАЛЬНОЕ ОКНО ==========
        document.getElementById('closeModal').addEventListener('click', () => {
            document.getElementById('skinModal').classList.remove('active');
            if (currentViewer) { currentViewer(); currentViewer = null; }
        });
        document.getElementById('skinModal').addEventListener('click', (e) => {
            if (e.target === document.getElementById('skinModal')) document.getElementById('closeModal').click();
        });

        // ========== СОРТИРОВКА И ПОИСК ==========
        document.getElementById('searchInput').addEventListener('input', (e) => {
            searchQuery = e.target.value;
            applyFiltersAndSort();
        });

        document.querySelectorAll('.sort-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('.sort-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                currentSort = btn.dataset.sort;
                applyFiltersAndSort();
            });
        });

        // ========== ЗАПУСК ==========
        loadSkins();
    </script>
</body>
</html>
